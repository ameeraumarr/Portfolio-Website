name: Linting Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    - name: Install dependencies
      run: |
        npm init -y
        npm install htmlhint stylelint stylelint-config-standard --save-dev

    - name: Run HTMLHint
      run: |
        npx htmlhint "**/*.html"

    - name: Run Stylelint
      run: |
        npx stylelint "**/*.css"
